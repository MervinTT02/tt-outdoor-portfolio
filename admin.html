<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>TT 图片管理</title>
    <link rel="stylesheet" href="./admin.css?v=20260306-2218" />
  </head>
  <body>
    <main class="page">
      <section id="login-card" class="login-card">
        <h1>图片管理后台</h1>
        <p>仅保留上传与删除功能</p>
        <div class="login-row">
          <input id="login-passcode" type="password" placeholder="输入管理密码" />
          <button id="login-btn" class="btn btn-primary">登录</button>
        </div>
        <p id="login-msg" class="message"></p>
      </section>

      <section id="admin-panel" class="admin-panel hidden">
        <header class="panel-header">
          <div>
            <h2>图片管理</h2>
            <p>选择路线后上传或删除图片</p>
          </div>
          <a href="./index.html" target="_blank" rel="noreferrer">打开前台</a>
        </header>

        <section class="panel-card">
          <div class="field-grid">
            <label>
              当前路线
              <select id="route-picker"></select>
            </label>
            <label>
              上传通道
              <select id="upload-provider">
                <option value="github">GitHub 仓库</option>
                <option value="cloudflare-images">Cloudflare Images</option>
              </select>
            </label>
          </div>
          <div class="route-actions">
            <button id="new-route-btn" class="btn">新建路线</button>
          </div>
          <div id="new-route-panel" class="route-create-panel hidden">
            <div class="field-grid">
              <label>
                路线名称
                <input id="nr-name" type="text" placeholder="例如：云南德钦·雨崩线" />
              </label>
              <label>
                路线地点
                <input id="nr-location" type="text" placeholder="例如：云南德钦" />
              </label>
              <label>
                路线强度
                <input id="nr-effort" type="text" placeholder="例如：2天轻装徒步" />
              </label>
              <label>
                路线亮点
                <input id="nr-highlight" type="text" placeholder="例如：雪山、冰湖、草甸" />
              </label>
            </div>
            <div class="upload-row">
              <button id="cancel-new-route-btn" class="btn">取消</button>
              <button id="confirm-new-route-btn" class="btn btn-primary">确认创建</button>
            </div>
          </div>

          <div id="github-fields" class="field-grid">
            <label>
              GitHub Owner
              <input id="gh-owner" type="text" placeholder="例如 MervinTT02" />
            </label>
            <label>
              GitHub Repo
              <input id="gh-repo" type="text" placeholder="例如 tt-outdoor-portfolio" />
            </label>
            <label>
              Branch
              <input id="gh-branch" type="text" placeholder="main" />
            </label>
            <label>
              GitHub Token
              <input id="gh-token" type="password" placeholder="具备 Contents 写权限（留空则沿用已保存）" />
            </label>
          </div>

          <div id="cf-fields" class="field-grid hidden">
            <label>
              Cloudflare Account ID
              <input id="cf-account-id" type="text" />
            </label>
            <label>
              Cloudflare Images Token
              <input id="cf-images-token" type="password" placeholder="留空则沿用已保存" />
            </label>
          </div>

          <div class="upload-row">
            <input id="r-upload-files" type="file" accept="image/*" multiple />
            <button id="r-upload-btn" class="btn">上传图片</button>
            <button id="save-all-btn" class="btn btn-primary">保存配置</button>
            <button id="publish-github-btn" class="btn btn-primary">发布到 GitHub</button>
          </div>

          <p id="save-msg" class="message"></p>
        </section>

        <section class="panel-card">
          <div class="list-head">
            <h3>当前路线图片</h3>
            <span id="photo-count">0 张</span>
          </div>
          <div id="r-photo-list" class="photo-grid"></div>
        </section>
      </section>
    </main>

    <script src="./site-data.js?v=20260317-1910"></script>
    <script src="./admin.js?v=20260317-1910"></script>
  </body>
</html>
